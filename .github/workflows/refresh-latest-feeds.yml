name: Refresh latest feeds

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/refresh-latest-feeds.yml"
      - "scripts/update-latest-feeds.mjs"
      - "tests/**"
      - "latest-feeds.js"
      - "data/latest-feeds.json"
  schedule:
    # Daily at 06:17 in America/Mexico_City (12:17 UTC).
    - cron: "17 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-latest-feeds
  cancel-in-progress: false

jobs:
  refresh-feeds:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out site code
        uses: actions/checkout@v4
        with:
          path: site

      - name: Check out feed snapshot
        uses: actions/checkout@v4
        with:
          ref: feed-data
          path: feed-data

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Test feed parser
        run: >-
          node --test
          site/tests/update-latest-feeds.test.mjs
          site/tests/latest-feeds-browser.test.mjs

      - name: Refresh both feeds
        run: >-
          node site/scripts/update-latest-feeds.mjs
          --existing feed-data/data/latest-feeds.json
          --output feed-data/data/latest-feeds.json

      - name: Publish feed snapshot
        working-directory: feed-data
        run: |
          if git diff --quiet -- data/latest-feeds.json; then
            echo "No feed changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/latest-feeds.json
          git commit -m "chore: refresh latest feeds"
          git push origin HEAD:feed-data
