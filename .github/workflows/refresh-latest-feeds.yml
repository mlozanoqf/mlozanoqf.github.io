name: Refresh latest feeds

on:
  schedule:
    - cron: "17 12 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-site:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.5.2"
          use-public-rspm: true

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2
        with:
          version: "1.8.25"

      - name: Install R dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          cache-version: 1
          packages: |
            any::knitr
            any::rmarkdown
            any::digest
            any::xml2

      - name: Render homepage
        env:
          XDG_CACHE_HOME: ${{ github.workspace }}/.cache
        run: quarto render index.qmd

      - name: Commit refreshed feed snapshot
        run: |
          if git diff --quiet -- index.html data/latest-feeds.R index_files; then
            echo "No feed changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A index.html data/latest-feeds.R index_files
          git commit -m "chore: refresh latest feeds"
          git push
